{% extends 'base.html' %}

{% block title %}Профиль{% endblock %}

{% block content %}
<div class="auth-card">
    <h2 class="text-center mb-4">Профиль пользователя</h2>
    
    <div class="text-center mb-4">
        <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center" 
             style="width: 100px; height: 100px; font-size: 40px;">
            {{ user.username|first|upper }}
        </div>
    </div>
    
    <div class="mb-3">
        <label class="form-label fw-bold">Имя пользователя:</label>
        <p class="form-control-plaintext">{{ user.username }}</p>
    </div>
    
    <div class="mb-3">
        <label class="form-label fw-bold">Email:</label>
        <p class="form-control-plaintext">{{ user.email }}</p>
    </div>
    
    <div class="mb-3">
        <label class="form-label fw-bold">Дата регистрации:</label>
        <p class="form-control-plaintext">{{ user.date_joined|date:"d.m.Y H:i" }}</p>
    </div>
    
    <div class="mb-3">
        <label class="form-label fw-bold">Последний вход:</label>
        <p class="form-control-plaintext">{{ user.last_login|date:"d.m.Y H:i" }}</p>
    </div>
    
    <div class="d-grid gap-2">
        <a href="{% url 'home' %}" class="btn btn-primary">На главную</a>
    </div>
</div>
{% endblock %}
